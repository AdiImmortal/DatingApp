<div class="card mt-5">
    <div class="card-body">


        <form #registerForm="ngForm" (ngSubmit)="register()" autocomplete="off" class="mr-4">

            <h2 class="text-center text-primary">
                Sign Up
            </h2>
            <hr>

            <div class="form-group">
                <input type="text" class="form-control" name="username" [(ngModel)]="model.username"
                    placeholder="User Name">
            </div>


            <div class="form-group mt-2">
                <input type="password" class="form-control" name="password" [(ngModel)]="model.password"
                    placeholder="Password">
            </div>

            <div class="form group text-center mt-3 ">
                <button class="btn btn-success ml-1" type="button" (click)="register()">
                    Register
                </button>
               &nbsp;
                <button class="btn btn-danger mr-2" type="button" (click)="cancle()">
                    Cancel
                </button>

            </div>

        </form>

    </div>
</div>
