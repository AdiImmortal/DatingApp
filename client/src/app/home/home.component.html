<div class="mt-5">
    <div style="text-align: center;" *ngIf="!registerMode" class="mt-4">
        <h1>Find Your Match </h1>
        <p class="lead">Come on at front find your partner.. all you need to do is sign up !!</p>
        <div class="text-center">
            <button class="btn btn-primary btn-lg mr-7" (click)="registerToggle()">Register</button> &nbsp;
            <button class="btn btn-info btn-lg">Learn More</button>
        </div>
    </div>
    
    <div class="mt-4"  *ngIf="registerMode">
        <div class="row justify-content-center mt-5">
            <div class="col-4">
                <app-register  (cancelRegister)="cancelRegisterMode($event)"></app-register>
            </div>
        </div>
    </div>
</div>
