


<div class="card" >
    <img src="{{member.photoUrl || './assets/user.png'}}" alt="{{member.knownAs}}" class="class-img-top">
        <ul class="list-inline member-icons animate text-center mb-5">
            <li class="list-inline-item">
                <button class="btn btn-sm btn-primary" routerLink="/member/{{member.userName}}">
                    <i class="fa fa-user"></i>
                </button>
            </li>

            <li class="list-inline-item">
                <button class="btn btn-sm btn-primary">
                    <i class="fa fa-heart"></i>
                </button>
            </li>

            <li class="list-inline-item">
                <button class="btn btn-sm btn-primary">
                    <i class="fa fa-envelope"></i>
                </button>
            </li>

        </ul>
    <div class="card-body">
        <h6 class="card-title text-center mb-1"><i class="fa fa-user mr-2"></i>
            {{member.knownAs}}
            </h6>
            <p class="card-text text-muted text-center">{{member.city}}</p>
    </div>
  </div>
